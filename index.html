<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jungle Terrain Generator</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:#0b1d13;
}

#canvas-container{
width:100vw;
height:100vh;
}

#controls{
position:absolute;
top:20px;
left:20px;
background:rgba(255,255,255,0.95);
padding:20px;
border-radius:8px;
box-shadow:0 4px 6px rgba(0,0,0,0.3);
max-width:300px;
}

h2{
margin-top:0;
color:#1a1a2e;
font-size:18px;
}

.control-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-size:13px;
color:#333;
font-weight:bold;
}

input[type="range"]{
width:100%;
}

.value-display{
float:right;
color:#666;
font-size:12px;
}

button{
width:100%;
padding:10px;
background:#2e8b57;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
font-size:14px;
font-weight:bold;
margin-top:10px;
}

button:hover{
background:#256f45;
}

#info{
position:absolute;
bottom:20px;
left:20px;
color:white;
font-size:12px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:4px;
}

</style>
</head>

<body>

<div id="canvas-container"></div>

<div id="controls">

<h2>Terrain Parameters</h2>

<div class="control-group">
<label>Scale <span class="value-display" id="scale-value">50</span></label>
<input type="range" id="scale" min="10" max="200" value="50">
</div>

<div class="control-group">
<label>Amplitude <span class="value-display" id="amplitude-value">15</span></label>
<input type="range" id="amplitude" min="1" max="50" value="15">
</div>

<div class="control-group">
<label>Octaves <span class="value-display" id="octaves-value">4</span></label>
<input type="range" id="octaves" min="1" max="8" value="4">
</div>

<div class="control-group">
<label>Persistence <span class="value-display" id="persistence-value">0.5</span></label>
<input type="range" id="persistence" min="0.1" max="1" value="0.5" step="0.1">
</div>

<div class="control-group">
<label>Lacunarity <span class="value-display" id="lacunarity-value">2</span></label>
<input type="range" id="lacunarity" min="1" max="4" value="2" step="0.1">
</div>

<div class="control-group">
<label>Seed <span class="value-display" id="seed-value">1234</span></label>
<input type="range" id="seed" min="1" max="9999" value="1234">
</div>

<button id="regenerate">Regenerate Terrain</button>
<button id="randomize">Randomize Parameters</button>
<button id="toggleWireframe">Toggle Wireframe</button>

</div>

<div id="info">
Use mouse to rotate • Scroll to zoom • Drag to pan
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

class PerlinNoise{

constructor(seed=0){
this.seed=seed
this.p=this.buildPermutationTable()
}

buildPermutationTable(){

const p=[]
for(let i=0;i<256;i++) p[i]=i

let n=256
while(n>1){
const k=Math.floor(this.seededRandom()*n--)
const temp=p[n]
p[n]=p[k]
p[k]=temp
}

for(let i=0;i<256;i++) p[256+i]=p[i]

return p
}

seededRandom(){
const x=Math.sin(this.seed++)*10000
return x-Math.floor(x)
}

fade(t){
return t*t*t*(t*(t*6-15)+10)
}

lerp(t,a,b){
return a+t*(b-a)
}

grad(hash,x,y){

const h=hash&15
const u=h<8?x:y
const v=h<4?y:h===12||h===14?x:0
return((h&1)===0?u:-u)+((h&2)===0?v:-v)

}

noise(x,y){

const X=Math.floor(x)&255
const Y=Math.floor(y)&255

x-=Math.floor(x)
y-=Math.floor(y)

const u=this.fade(x)
const v=this.fade(y)

const a=this.p[X]+Y
const aa=this.p[a]
const ab=this.p[a+1]

const b=this.p[X+1]+Y
const ba=this.p[b]
const bb=this.p[b+1]

return this.lerp(v,
this.lerp(u,this.grad(this.p[aa],x,y),this.grad(this.p[ba],x-1,y)),
this.lerp(u,this.grad(this.p[ab],x,y-1),this.grad(this.p[bb],x-1,y-1))
)

}

octaveNoise(x,y,octaves,persistence,lacunarity){

let total=0
let frequency=1
let amplitude=1
let maxValue=0

for(let i=0;i<octaves;i++){
total+=this.noise(x*frequency,y*frequency)*amplitude
maxValue+=amplitude
amplitude*=persistence
frequency*=lacunarity
}

return total/maxValue

}

}

let scene,camera,renderer,terrain
let noiseGenerator

const params={
scale:50,
amplitude:15,
octaves:4,
persistence:0.5,
lacunarity:2,
seed:1234,
resolution:100
}

function init(){

scene=new THREE.Scene()
scene.background=new THREE.Color(0x87ceeb)
scene.fog=new THREE.Fog(0x2E8B57,40,200)

camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)
camera.position.set(0,50,80)

renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)

document.getElementById("canvas-container").appendChild(renderer.domElement)

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(50,100,50)
scene.add(light)

const ambient=new THREE.AmbientLight(0x404040,0.7)
scene.add(ambient)

generateTerrain()

window.addEventListener("resize",onResize)

animate()

}

function generateTerrain(){

if(terrain){
scene.remove(terrain)
terrain.geometry.dispose()
terrain.material.dispose()
}

noiseGenerator=new PerlinNoise(params.seed)

const geometry=new THREE.PlaneGeometry(100,100,params.resolution-1,params.resolution-1)

const vertices=geometry.attributes.position.array

for(let i=0;i<vertices.length;i+=3){

const x=vertices[i]
const y=vertices[i+1]

const height=noiseGenerator.octaveNoise(
x/params.scale,
y/params.scale,
params.octaves,
params.persistence,
params.lacunarity
)*params.amplitude

vertices[i+2]=height

}

geometry.computeVertexNormals()

const colors=[]

for(let i=0;i<vertices.length;i+=3){

const h=vertices[i+2]
const color=new THREE.Color()

if(h<1) color.setHex(0x0B3D91)
else if(h<2) color.setHex(0x1E90FF)
else if(h<5) color.setHex(0x4B8B3B)
else if(h<12) color.setHex(0x1F5D2B)
else if(h<18) color.setHex(0x3E2723)
else color.setHex(0xA5D6A7)

colors.push(color.r,color.g,color.b)

}

geometry.setAttribute("color",new THREE.Float32BufferAttribute(colors,3))

const material=new THREE.MeshStandardMaterial({
vertexColors:true,
flatShading:true,
roughness:0.8
})

terrain=new THREE.Mesh(geometry,material)
terrain.rotation.x=-Math.PI/2

scene.add(terrain)

}

function animate(){

requestAnimationFrame(animate)

if(terrain) terrain.rotation.z+=0.001

renderer.render(scene,camera)

}

function onResize(){

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

}

document.getElementById("regenerate").onclick=generateTerrain

document.getElementById("randomize").onclick=()=>{
params.scale=Math.random()*180+20
params.amplitude=Math.random()*40+10
params.octaves=Math.floor(Math.random()*7)+1
params.persistence=Math.random()*0.9+0.1
params.lacunarity=Math.random()*3+1
params.seed=Math.floor(Math.random()*9999)
generateTerrain()
}

document.getElementById("toggleWireframe").onclick=()=>{
if(terrain) terrain.material.wireframe=!terrain.material.wireframe
}

init()

</script>

</body>
</html>
