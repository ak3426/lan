<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Procedural Planet Noise System</title>

<style>
body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#controls{
position:absolute;
top:20px;
left:20px;
background:white;
padding:15px;
border-radius:6px;
width:220px;
}

button{
margin-top:10px;
width:100%;
padding:6px;
}
</style>
</head>

<body>

<div id="controls">

<h3>Planet Controls</h3>

Scale
<input type="range" id="scale" min="10" max="150" value="50">

Amplitude
<input type="range" id="amp" min="1" max="20" value="8">

Octaves
<input type="range" id="oct" min="1" max="6" value="4">

<button id="regen">Regenerate</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* ---------------- PERLIN NOISE ---------------- */

class PerlinNoise{

constructor(){
this.p=[];

for(let i=0;i<256;i++){
this.p[i]=i;
}

for(let i=255;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[this.p[i],this.p[j]]=[this.p[j],this.p[i]];
}

this.p=this.p.concat(this.p);
}

fade(t){
return t*t*t*(t*(t*6-15)+10);
}

lerp(t,a,b){
return a+t*(b-a);
}

grad(hash,x,y,z){

let h=hash&15;

let u=h<8?x:y;
let v=h<4?y:h===12||h===14?x:z;

return((h&1)===0?u:-u)+((h&2)===0?v:-v);

}

noise(x,y,z){

let X=Math.floor(x)&255;
let Y=Math.floor(y)&255;
let Z=Math.floor(z)&255;

x-=Math.floor(x);
y-=Math.floor(y);
z-=Math.floor(z);

let u=this.fade(x);
let v=this.fade(y);
let w=this.fade(z);

let A=this.p[X]+Y;
let AA=this.p[A]+Z;
let AB=this.p[A+1]+Z;
let B=this.p[X+1]+Y;
let BA=this.p[B]+Z;
let BB=this.p[B+1]+Z;

return this.lerp(w,

this.lerp(v,

this.lerp(u,this.grad(this.p[AA],x,y,z),
this.grad(this.p[BA],x-1,y,z)),

this.lerp(u,this.grad(this.p[AB],x,y-1,z),
this.grad(this.p[BB],x-1,y-1,z))
),

this.lerp(v,

this.lerp(u,this.grad(this.p[AA+1],x,y,z-1),
this.grad(this.p[BA+1],x-1,y,z-1)),

this.lerp(u,this.grad(this.p[AB+1],x,y-1,z-1),
this.grad(this.p[BB+1],x-1,y-1,z-1))
)

);

}

}

/* ---------------- THREE SETUP ---------------- */

let scene,camera,renderer,planet;
let noise=new PerlinNoise();

const params={
scale:50,
amp:8,
oct:4
};

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z=80;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,50,50);
scene.add(light);

generatePlanet();

animate();

}

/* ---------------- FRACTAL NOISE ---------------- */

function fractalNoise(x,y,z){

let total=0;
let frequency=1;
let amplitude=1;
let maxValue=0;

for(let i=0;i<params.oct;i++){

total+=noise.noise(
x*frequency,
y*frequency,
z*frequency
)*amplitude;

maxValue+=amplitude;

amplitude*=0.5;
frequency*=2;

}

return total/maxValue;

}

/* ---------------- PLANET ---------------- */

function generatePlanet(){

if(planet) scene.remove(planet);

const geo=new THREE.SphereGeometry(30,128,128);

const pos=geo.attributes.position;

for(let i=0;i<pos.count;i++){

let v=new THREE.Vector3();
v.fromBufferAttribute(pos,i);

let n=fractalNoise(
v.x/params.scale,
v.y/params.scale,
v.z/params.scale
);

let h=n*params.amp;

v.normalize().multiplyScalar(30+h);

pos.setXYZ(i,v.x,v.y,v.z);

}

geo.computeVertexNormals();

const mat=new THREE.MeshStandardMaterial({
color:0x55aa55,
flatShading:true
});

planet=new THREE.Mesh(geo,mat);
scene.add(planet);

}

/* ---------------- LOOP ---------------- */

function animate(){

requestAnimationFrame(animate);

if(planet){
planet.rotation.y+=0.002;
}

renderer.render(scene,camera);

}

init();

/* ---------------- UI ---------------- */

document.getElementById("regen").onclick=()=>{
generatePlanet();
};

document.getElementById("scale").oninput=(e)=>{
params.scale=parseFloat(e.target.value);
};

document.getElementById("amp").oninput=(e)=>{
params.amp=parseFloat(e.target.value);
};

document.getElementById("oct").oninput=(e)=>{
params.oct=parseFloat(e.target.value);
};

</script>

</body>
</html>

</script>

</body>
</html>
