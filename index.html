<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Procedural Planet Noise System</title>

<style>

body{
margin:0;
overflow:hidden;
background:#000;
font-family:Arial;
}

#controls{
position:absolute;
top:20px;
left:20px;
background:white;
padding:15px;
border-radius:8px;
width:220px;
}

button{
margin-top:8px;
width:100%;
padding:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="controls">

<h3>Planet Generator</h3>

Scale
<input type="range" id="scale" min="10" max="150" value="50">

Amplitude
<input type="range" id="amp" min="1" max="20" value="8">

Octaves
<input type="range" id="oct" min="1" max="6" value="4">

<button id="regen">Regenerate Planet</button>

<button id="sound">Play Terrain Sound</button>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene,camera,renderer,planet;

const params={
scale:50,
amp:8,
oct:4
};

let time=0;

function noise(x,y){
return Math.sin(x*0.3)+Math.cos(y*0.3);
}

function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z=80;

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(30,50,50);

scene.add(light);

generatePlanet();

animate();

}

function generatePlanet(){

if(planet){
scene.remove(planet);
}

const geo=new THREE.SphereGeometry(30,128,128);

const pos=geo.attributes.position;

for(let i=0;i<pos.count;i++){

let v=new THREE.Vector3();
v.fromBufferAttribute(pos,i);

let n=noise(
v.x/params.scale,
v.y/params.scale
);

let h=n*params.amp;

v.normalize().multiplyScalar(30+h);

pos.setXYZ(i,v.x,v.y,v.z);

}

geo.computeVertexNormals();

const mat=new THREE.MeshStandardMaterial({
color:0x55aa55,
flatShading:true
});

planet=new THREE.Mesh(geo,mat);

scene.add(planet);

}

function animate(){

requestAnimationFrame(animate);

time+=0.01;

if(planet){
planet.rotation.y+=0.002;
}

renderer.render(scene,camera);

}

init();

document.getElementById("regen").onclick=()=>{
generatePlanet();
};

document.getElementById("scale").oninput=(e)=>{
params.scale=parseFloat(e.target.value);
};

document.getElementById("amp").oninput=(e)=>{
params.amp=parseFloat(e.target.value);
};

document.getElementById("oct").oninput=(e)=>{
params.oct=parseFloat(e.target.value);
};





/* AUDIO SYSTEM */

let audioCtx;

function playNoiseSound(){

if(!audioCtx){
audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

const duration=4;
const now=audioCtx.currentTime;

const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();

osc.type="sine";

gain.gain.setValueAtTime(0,now);
gain.gain.linearRampToValueAtTime(0.3,now+0.2);
gain.gain.linearRampToValueAtTime(0,now+duration);

osc.connect(gain);
gain.connect(audioCtx.destination);

for(let i=0;i<120;i++){

let t=now+(i*duration/120);

let n=noise(i/10,0);

let freq=220+(n*150);

osc.frequency.linearRampToValueAtTime(freq,t);

}

osc.start(now);
osc.stop(now+duration);

}

document.getElementById("sound").onclick=()=>{
playNoiseSound();
};

</script>

</body>
</html>
